{% extends "base.html" %}
{% block title %}Entrar — Capitán{% endblock %}
{% block content %}

<div class="max-w-sm mx-auto mt-6">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Acceso de capitanes</h1>
  <p class="text-slate-600 text-sm mb-5">
    Solo para los capitanes asignados a cada hospital.
  </p>

  {% if error %}
    <div class="bg-red-100 border border-red-300 text-red-800 rounded-lg px-4 py-3 mb-4 text-sm">
      Usuario o contraseña incorrectos.
    </div>
  {% endif %}

  <form method="post" action="/entrar"
        class="bg-white rounded-xl border border-slate-200 p-5 space-y-3">
    <div>
      <label class="block text-sm font-semibold mb-1">Usuario</label>
      <input type="text" name="usuario" required autofocus
             class="w-full rounded-lg border border-slate-300 px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">Contraseña</label>
      <input type="password" name="clave" required
             class="w-full rounded-lg border border-slate-300 px-3 py-2">
    </div>
    <button class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-lg">
      Entrar
    </button>
  </form>
</div>

{% endblock %}
