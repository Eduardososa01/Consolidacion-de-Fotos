<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Reconexión{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">
  <header class="bg-slate-900 text-white">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-2 font-bold text-lg">
        <span class="text-red-400">✚</span> Reconexión
      </a>
      <a href="/subir"
         class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-lg text-sm">
        Subir foto de lista
      </a>
    </div>
  </header>

  <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-slate-500 py-6 px-4">
    Plataforma para reconectar personas encontradas en hospitales con sus familias.
    Prototipo — verifica siempre la información directamente en el hospital.
  </footer>
</body>
</html>
